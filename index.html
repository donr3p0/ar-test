<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: ./burger-marker.mind;"
  color-space="sRGB"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true;"
>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="burgerModel" src="./burger.glb"></a-asset-item>
  </a-assets>

  <!-- Camera -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <!-- Lights -->
  <a-light
    type="ambient"
    intensity="1.2">
  </a-light>

  <a-light
    type="directional"
    intensity="1"
    position="1 2 1">
  </a-light>

  <!-- AR Target -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Burger Model -->
    <a-gltf-model
      src="#burgerModel"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.01 0.01 0.01"

      animation="property: scale;
                 to: 0.25 0.25 0.25;
                 dur: 1400;
                 easing: easeOutElastic"

      animation__rotate="property: rotation;
                          to: 0 360 0;
                          dur: 1800;
                          easing: linear">

    </a-gltf-model>

    <!-- Fake Shadow -->
    <a-circle
      position="0 -0.01 0"
      rotation="-90 0 0"
      radius="0.35"
      color="black"
      opacity="0.25">
    </a-circle>

  </a-entity>

</a-scene>

</body>

</html>
