<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }
    </style>
  </head>

  <body>

    <a-scene
      mindar-image="imageTargetSrc: ./burger-marker.mind;"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="colorManagement: true; physicallyCorrectLights: true; exposure: 1.15; toneMapping: ACESFilmicToneMapping;"
    >

      <!-- ASSETS -->
      <a-assets>
        <a-asset-item id="burgerModel" src="./burger.glb"></a-asset-item>
      </a-assets>

      <!-- CAMERA -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- LIGHTING (FOOD STYLE) -->
      <a-light type="ambient" intensity="0.55" color="#fff2e6"></a-light>

      <a-light
        type="directional"
        intensity="1.4"
        color="#ffffff"
        position="1 3 2">
      </a-light>

      <a-light
        type="directional"
        intensity="0.6"
        color="#ffd7b3"
        position="-2 1 1">
      </a-light>

      <!-- AR TARGET -->
      <a-entity mindar-image-target="targetIndex: 0">

        <!-- GROUP WRAPPER -->
        <a-entity position="0 0 0">

          <!-- BURGER -->
          <a-gltf-model
            src="#burgerModel"
            position="0 0 0"
            rotation="0 0 0"
            scale="0.25 0.25 0.25">
          </a-gltf-model>

          <!-- CONTACT SHADOW (VERY IMPORTANT FOR REALISM) -->
          <a-circle
            position="0 -0.001 0"
            rotation="-90 0 0"
            radius="0.35"
            color="#000000"
            opacity="0.35"
            material="shader: flat">
          </a-circle>

        </a-entity>

      </a-entity>

    </a-scene>

  </body>
</html>
